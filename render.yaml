services:
  - type: web
    name: threads-affiliate-ops
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4173
      - key: DATABASE_URL
        fromDatabase:
          name: threads-affiliate-ops-db
          property: connectionString
      - key: DATABASE_AUTO_MIGRATE
        value: "true"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ENABLE_WORKER
        value: "true"
      - key: AUTONOMY_MODE
        value: "true"
      - key: AUTOMATION_INTERVAL_MS
        value: "60000"
      - key: WORKER_LEASE_MS
        value: "180000"
      - key: ALLOW_DEMO_OFFERS
        value: "false"
      - key: AUTONOMY_INTERVAL_MS
        value: "21600000"
      - key: AUTONOMY_MAX_SCRIPTS_PER_RUN
        value: "3"
      - key: AUTONOMY_MAX_OFFERS_PER_RUN
        value: "3"
      - key: AD_INTELLIGENCE_FEED_URLS
        sync: false
      - key: AFFILIATE_OFFER_FEED_URLS
        sync: false
      - key: AD_INTELLIGENCE_MAX_ITEMS
        value: "24"
      - key: AD_INTELLIGENCE_TIMEOUT_MS
        value: "8000"
      - key: META_GRAPH_BASE
        value: https://graph.facebook.com/v25.0
      - key: META_AD_LIBRARY_ACCESS_TOKEN
        sync: false
      - key: META_AD_LIBRARY_QUERY
        sync: false
      - key: META_AD_LIBRARY_COUNTRIES
        value: US
      - key: META_AD_LIBRARY_AD_TYPE
        value: ALL
      - key: META_AD_LIBRARY_LIMIT
        value: "10"
      - key: CONVERSION_WEBHOOK_SECRET
        sync: false
      - key: THREADS_GRAPH_BASE
        value: https://graph.threads.net/v1.0
      - key: THREADS_DRY_RUN
        value: "true"
      - key: THREADS_USER_ID
        sync: false
      - key: THREADS_ACCESS_TOKEN
        sync: false
      - key: THREADS_PUBLISH_DELAY_MS
        value: "30000"
      - key: AI_DRAFT_PROVIDER
        value: openai
      - key: PROFIT_SCRIPT_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_TIMEOUT_MS
        value: "90000"
      - key: AI_WEB_RESEARCH_ENABLED
        value: "true"
      - key: AI_WEB_RESEARCH_TIMEOUT_MS
        value: "45000"
      - key: AI_WEB_RESEARCH_MAX_SOURCES
        value: "6"
      - key: DEFAULT_DISCLOSURE_TEXT
        value: 含聯盟連結
      - key: DEFAULT_UTM_SOURCE
        value: threads
      - key: DEFAULT_UTM_MEDIUM
        value: affiliate_social

databases:
  - name: threads-affiliate-ops-db
    plan: free
